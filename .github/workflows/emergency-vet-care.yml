name: Process emergency vet care

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

concurrency:
  group: process-emergency-vet-care
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Process expired emergency vet care
        env:
          SHOWRING_JOBS_BASE_URL: ${{ secrets.SHOWRING_JOBS_BASE_URL }}
          SHOWRING_JOBS_SECRET: ${{ secrets.SHOWRING_JOBS_SECRET }}
        run: |
          if [ -z "$SHOWRING_JOBS_BASE_URL" ]; then
            echo "SHOWRING_JOBS_BASE_URL is not set"
            exit 1
          fi

          if [ -z "$SHOWRING_JOBS_SECRET" ]; then
            echo "SHOWRING_JOBS_SECRET is not set"
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --max-time 100 \
            --header "Authorization: Bearer ${SHOWRING_JOBS_SECRET}" \
            "${SHOWRING_JOBS_BASE_URL%/}/api/jobs/process-emergency-vet-care"
          echo
