name: Publish show results

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: "Endpoint passes to run for this dispatch."
        required: false
      block_batch_size:
        description: "Maximum due breed blocks to load per endpoint pass."
        required: false
      finalize_batch_size:
        description: "Maximum show days to finalize per endpoint pass."
        required: false
      sleep_seconds:
        description: "Seconds to sleep between endpoint passes."
        required: false

concurrency:
  group: publish-show-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Call publish job
        env:
          SHOWRING_JOBS_BASE_URL: ${{ secrets.SHOWRING_JOBS_BASE_URL }}
          SHOWRING_JOBS_SECRET: ${{ secrets.SHOWRING_JOBS_SECRET }}
          SHOWRING_JOBS_RUNS: ${{ inputs.runs || vars.SHOWRING_JOBS_RUNS || '7' }}
          SHOWRING_JOBS_BLOCK_BATCH_SIZE: ${{ inputs.block_batch_size || vars.SHOWRING_JOBS_BLOCK_BATCH_SIZE || '4' }}
          SHOWRING_JOBS_FINALIZE_BATCH_SIZE: ${{ inputs.finalize_batch_size || vars.SHOWRING_JOBS_FINALIZE_BATCH_SIZE || '8' }}
          SHOWRING_JOBS_SLEEP_SECONDS: ${{ inputs.sleep_seconds || vars.SHOWRING_JOBS_SLEEP_SECONDS || '2' }}
        run: |
          if [ -z "$SHOWRING_JOBS_BASE_URL" ]; then
            echo "SHOWRING_JOBS_BASE_URL is not set"
            exit 1
          fi

          if [ -z "$SHOWRING_JOBS_SECRET" ]; then
            echo "SHOWRING_JOBS_SECRET is not set"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_RUNS" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_RUNS must be a positive integer"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_BLOCK_BATCH_SIZE" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_BLOCK_BATCH_SIZE must be a positive integer"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_FINALIZE_BATCH_SIZE" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_FINALIZE_BATCH_SIZE must be a positive integer"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_SLEEP_SECONDS" | grep -Eq '^[0-9]+$'; then
            echo "SHOWRING_JOBS_SLEEP_SECONDS must be a non-negative integer"
            exit 1
          fi

          # Scheduled fallback capacity is 7 passes * 4 breed blocks = 28
          # breed blocks/hour, just above the estimated 27 blocks/hour needed
          # for normal show volume. Manual dispatch inputs remain available for
          # larger catch-up backlogs without changing scheduled behavior.
          job_url="${SHOWRING_JOBS_BASE_URL%/}/api/jobs/publish-show-results?blockBatchSize=${SHOWRING_JOBS_BLOCK_BATCH_SIZE}&finalizeBatchSize=${SHOWRING_JOBS_FINALIZE_BATCH_SIZE}"

          for run in $(seq 1 "${SHOWRING_JOBS_RUNS}"); do
            echo "Publish show results pass ${run}/${SHOWRING_JOBS_RUNS}"
            echo "Config: blockBatchSize=${SHOWRING_JOBS_BLOCK_BATCH_SIZE} finalizeBatchSize=${SHOWRING_JOBS_FINALIZE_BATCH_SIZE} sleepSeconds=${SHOWRING_JOBS_SLEEP_SECONDS}"
            response_file="$(mktemp)"
            set +e
            http_code="$(curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${SHOWRING_JOBS_SECRET}" \
              "$job_url")"
            curl_exit="$?"
            set -e

            cat "$response_file"
            echo
            rm -f "$response_file"

            if [ "$curl_exit" -ne 0 ]; then
              echo "Publish show results pass ${run} failed with curl exit ${curl_exit}"
              exit "$curl_exit"
            fi

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "Publish show results pass ${run} failed with HTTP ${http_code}"
              exit 22
            fi

            if [ "$run" -lt "$SHOWRING_JOBS_RUNS" ]; then
              sleep "$SHOWRING_JOBS_SLEEP_SECONDS"
            fi
          done
