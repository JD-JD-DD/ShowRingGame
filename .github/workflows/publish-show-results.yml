name: Publish show results

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: publish-show-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Call publish job
        env:
          SHOWRING_JOBS_BASE_URL: ${{ secrets.SHOWRING_JOBS_BASE_URL }}
          SHOWRING_JOBS_SECRET: ${{ secrets.SHOWRING_JOBS_SECRET }}
          SHOWRING_JOBS_RUNS: ${{ vars.SHOWRING_JOBS_RUNS || '5' }}
          SHOWRING_JOBS_BLOCK_BATCH_SIZE: ${{ vars.SHOWRING_JOBS_BLOCK_BATCH_SIZE || '2' }}
          SHOWRING_JOBS_FINALIZE_BATCH_SIZE: ${{ vars.SHOWRING_JOBS_FINALIZE_BATCH_SIZE || '4' }}
        run: |
          if [ -z "$SHOWRING_JOBS_BASE_URL" ]; then
            echo "SHOWRING_JOBS_BASE_URL is not set"
            exit 1
          fi

          if [ -z "$SHOWRING_JOBS_SECRET" ]; then
            echo "SHOWRING_JOBS_SECRET is not set"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_RUNS" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_RUNS must be a positive integer"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_BLOCK_BATCH_SIZE" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_BLOCK_BATCH_SIZE must be a positive integer"
            exit 1
          fi

          if ! echo "$SHOWRING_JOBS_FINALIZE_BATCH_SIZE" | grep -Eq '^[1-9][0-9]*$'; then
            echo "SHOWRING_JOBS_FINALIZE_BATCH_SIZE must be a positive integer"
            exit 1
          fi

          # Keep throughput configurable while infrastructure is constrained.
          # Default to five endpoint passes per scheduled run; raise or lower
          # SHOWRING_JOBS_RUNS from GitHub variables as capacity changes.
          # GCH processing adds title-credit work to each judged breed block, so
          # keep the per-request block batch small enough for serverless limits.
          job_url="${SHOWRING_JOBS_BASE_URL%/}/api/jobs/publish-show-results?blockBatchSize=${SHOWRING_JOBS_BLOCK_BATCH_SIZE}&finalizeBatchSize=${SHOWRING_JOBS_FINALIZE_BATCH_SIZE}"

          for run in $(seq 1 "${SHOWRING_JOBS_RUNS}"); do
            echo "Publish show results pass ${run}/${SHOWRING_JOBS_RUNS}"
            response_file="$(mktemp)"
            set +e
            http_code="$(curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${SHOWRING_JOBS_SECRET}" \
              "$job_url")"
            curl_exit="$?"
            set -e

            cat "$response_file"
            echo
            rm -f "$response_file"

            if [ "$curl_exit" -ne 0 ]; then
              echo "Publish show results pass ${run} failed with curl exit ${curl_exit}"
              exit "$curl_exit"
            fi

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "Publish show results pass ${run} failed with HTTP ${http_code}"
              exit 22
            fi

            if [ "$run" -lt "$SHOWRING_JOBS_RUNS" ]; then
              sleep 2
            fi
          done
